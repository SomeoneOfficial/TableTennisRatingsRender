services:
  - type: web
    name: rankmaster-pro
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rankmaster-pro-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: rankmaster-pro-db
